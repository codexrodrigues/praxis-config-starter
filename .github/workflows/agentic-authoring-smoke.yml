name: Agentic Authoring HTTP Smoke

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'AI provider used by the quickstart HTTP smoke.'
        required: true
        default: openai
        type: choice
        options:
          - openai
          - gemini
      quickstart_ref:
        description: 'praxis-api-quickstart ref to test against.'
        required: false
        default: main
        type: string
      metadata_ref:
        description: 'praxis-metadata-starter ref to install locally for metadata/domain catalog contracts.'
        required: false
        default: main
        type: string
      ui_ref:
        description: 'praxis-ui-angular ref to test against when the page-builder full E2E gate is enabled.'
        required: false
        default: main
        type: string
      run_page_builder_full_e2e:
        description: 'Run the full page-builder agentic Playwright gate after the HTTP/SSE smoke.'
        required: false
        default: false
        type: boolean
      run_quickstart_http_smoke:
        description: 'Run the quickstart agentic authoring HTTP/SSE smoke.'
        required: false
        default: true
        type: boolean
      run_domain_catalog_v2_smoke:
        description: 'Run the quickstart Domain Catalog v2 HTTP smoke.'
        required: false
        default: true
        type: boolean
      run_llm_compliance_policy_shadow:
        description: 'Run the external LLM compliance-policy shadow test against the selected provider.'
        required: false
        default: false
        type: boolean
      fail_llm_compliance_on_provider_unavailable:
        description: 'Fail the compliance-policy shadow when the selected provider is unavailable or quota-limited.'
        required: false
        default: false
        type: boolean
      stream_processing_timeout_seconds:
        description: 'Backend LLM stream processing timeout used by HTTP smoke and page-builder E2E.'
        required: false
        default: '180'
        type: string
      quickstart_startup_timeout_seconds:
        description: 'Quickstart startup timeout used by HTTP smoke, domain catalog smoke and page-builder E2E.'
        required: false
        default: '180'
        type: string

concurrency:
  group: agentic-authoring-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quickstart-http-smoke:
    name: Quickstart HTTP/SSE smoke and optional page-builder full E2E
    runs-on: windows-latest
    timeout-minutes: 75
    permissions:
      contents: read
    env:
      PRAXIS_AI_OPENAI_API_KEY: ${{ secrets.PRAXIS_AI_OPENAI_API_KEY }}
      PRAXIS_AI_OPENAI_MODEL: ${{ vars.PRAXIS_AI_OPENAI_MODEL || 'gpt-4.1-mini' }}
      PRAXIS_AI_GEMINI_API_KEY: ${{ secrets.PRAXIS_AI_GEMINI_API_KEY }}
      PRAXIS_AI_GEMINI_MODEL: ${{ vars.PRAXIS_AI_GEMINI_MODEL || 'gemini-2.5-flash' }}
    steps:
      - name: Checkout praxis-config-starter
        uses: actions/checkout@v5
        with:
          path: praxis-config-starter

      - name: Checkout praxis-api-quickstart
        uses: actions/checkout@v5
        with:
          repository: codexrodrigues/praxis-api-quickstart
          ref: ${{ inputs.quickstart_ref }}
          path: praxis-api-quickstart
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - name: Checkout praxis-metadata-starter
        uses: actions/checkout@v5
        with:
          repository: codexrodrigues/praxis-metadata-starter
          ref: ${{ inputs.metadata_ref }}
          path: praxis-metadata-starter
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - name: Checkout praxis-ui-angular
        if: inputs.run_page_builder_full_e2e == true
        uses: actions/checkout@v5
        with:
          repository: codexrodrigues/praxis-ui-angular
          ref: ${{ inputs.ui_ref }}
          path: praxis-ui-angular
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js 20
        if: inputs.run_page_builder_full_e2e == true
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: praxis-ui-angular/package-lock.json

      - name: Prepare AI env file
        shell: pwsh
        working-directory: praxis-config-starter
        run: |
          function Escape-PsSingleQuoted([string] $Value) {
            if ($null -eq $Value) {
              return ''
            }
            return $Value.Replace("'", "''")
          }
          $provider = '${{ inputs.provider }}'
          if ($provider -eq 'openai' -and [string]::IsNullOrWhiteSpace($env:PRAXIS_AI_OPENAI_API_KEY)) {
            throw 'Missing required secret PRAXIS_AI_OPENAI_API_KEY for provider=openai.'
          }
          if ($provider -eq 'gemini' -and [string]::IsNullOrWhiteSpace($env:PRAXIS_AI_GEMINI_API_KEY)) {
            throw 'Missing required secret PRAXIS_AI_GEMINI_API_KEY for provider=gemini.'
          }
          @"
          `$env:PRAXIS_AI_OPENAI_API_KEY = '$(Escape-PsSingleQuoted $env:PRAXIS_AI_OPENAI_API_KEY)'
          `$env:PRAXIS_AI_OPENAI_MODEL = '$(Escape-PsSingleQuoted $env:PRAXIS_AI_OPENAI_MODEL)'
          `$env:PRAXIS_AI_GEMINI_API_KEY = '$(Escape-PsSingleQuoted $env:PRAXIS_AI_GEMINI_API_KEY)'
          `$env:PRAXIS_AI_GEMINI_MODEL = '$(Escape-PsSingleQuoted $env:PRAXIS_AI_GEMINI_MODEL)'
          "@ | Set-Content -LiteralPath .env.openai.local.ps1 -Encoding UTF8

      - name: Resolve quickstart starter versions
        shell: pwsh
        working-directory: praxis-api-quickstart
        run: |
          $configVersion = mvn -q -DforceStdout help:evaluate "-Dexpression=praxis.config.version"
          if ([string]::IsNullOrWhiteSpace($configVersion)) {
            throw 'Could not resolve praxis-api-quickstart praxis.config.version.'
          }
          $metadataVersion = mvn -q -DforceStdout help:evaluate "-Dexpression=praxis.core.version"
          if ([string]::IsNullOrWhiteSpace($metadataVersion)) {
            throw 'Could not resolve praxis-api-quickstart praxis.core.version.'
          }
          "STARTER_VERSION=$configVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "METADATA_STARTER_VERSION=$metadataVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install praxis-metadata-starter locally
        shell: pwsh
        working-directory: praxis-metadata-starter
        run: |
          mvn -q versions:set "-DnewVersion=$env:METADATA_STARTER_VERSION" -DgenerateBackupPoms=false
          mvn -B -DskipTests install

      - name: Install praxis-config-starter locally
        shell: pwsh
        working-directory: praxis-config-starter
        run: |
          mvn -q versions:set "-DnewVersion=$env:STARTER_VERSION" -DgenerateBackupPoms=false
          mvn -B -DskipTests install

      - name: Package praxis-api-quickstart against local starter
        shell: pwsh
        working-directory: praxis-api-quickstart
        run: mvn -B -DskipTests "-Dpraxis.core.version=$env:METADATA_STARTER_VERSION" "-Dpraxis.config.version=$env:STARTER_VERSION" package

      - name: Install praxis-ui-angular dependencies
        if: inputs.run_page_builder_full_e2e == true
        shell: pwsh
        working-directory: praxis-ui-angular
        run: npm ci --no-audit --fund=false

      - name: Install Playwright Chromium
        if: inputs.run_page_builder_full_e2e == true
        shell: pwsh
        working-directory: praxis-ui-angular
        run: npx playwright install chromium

      - name: Run quickstart authoring HTTP/SSE smoke suite
        if: inputs.run_quickstart_http_smoke == true
        shell: pwsh
        working-directory: praxis-config-starter
        run: |
          .\tools\Invoke-QuickstartAgenticAuthoringHttpSmokeSuite.ps1 `
            -Provider '${{ inputs.provider }}' `
            -JavaHome "$env:JAVA_HOME" `
            -QuickstartRoot "$env:GITHUB_WORKSPACE\praxis-api-quickstart" `
            -EnvFile "$env:GITHUB_WORKSPACE\praxis-config-starter\.env.openai.local.ps1" `
            -StartupTimeoutSec ([int]'${{ inputs.quickstart_startup_timeout_seconds }}') `
            -StreamProcessingTimeoutSeconds ([int]'${{ inputs.stream_processing_timeout_seconds }}')

      - name: Run quickstart Domain Catalog v2 HTTP smoke
        if: inputs.run_domain_catalog_v2_smoke == true
        shell: pwsh
        working-directory: praxis-config-starter
        run: |
          .\tools\Invoke-QuickstartDomainCatalogV2HttpSmoke.ps1 `
            -JavaHome "$env:JAVA_HOME" `
            -QuickstartRoot "$env:GITHUB_WORKSPACE\praxis-api-quickstart" `
            -StartupTimeoutSec ([int]'${{ inputs.quickstart_startup_timeout_seconds }}')

      - name: Run LLM compliance-policy shadow
        if: inputs.run_llm_compliance_policy_shadow == true
        shell: pwsh
        working-directory: praxis-config-starter
        env:
          PRAXIS_AGENTIC_AUTHORING_LLM_COMPLIANCE_POLICY: "true"
          PRAXIS_AGENTIC_AUTHORING_LLM_COMPLIANCE_FAIL_ON_PROVIDER_UNAVAILABLE: ${{ inputs.fail_llm_compliance_on_provider_unavailable }}
          PRAXIS_AGENTIC_AUTHORING_SHADOW_PROVIDER: ${{ inputs.provider }}
          PRAXIS_AI_PROVIDER: ${{ inputs.provider }}
        run: mvn -B "-Dtest=AgenticAuthoringLlmCompliancePolicyIntegrationTest" test

      - name: Run page-builder agentic full E2E gate
        if: inputs.run_page_builder_full_e2e == true
        shell: pwsh
        working-directory: praxis-config-starter
        run: |
          .\tools\Invoke-PbAgenticFullE2E.ps1 `
            -Provider '${{ inputs.provider }}' `
            -JavaHome "$env:JAVA_HOME" `
            -QuickstartRoot "$env:GITHUB_WORKSPACE\praxis-api-quickstart" `
            -UiRoot "$env:GITHUB_WORKSPACE\praxis-ui-angular" `
            -EnvFile "$env:GITHUB_WORKSPACE\praxis-config-starter\.env.openai.local.ps1" `
            -StartupTimeoutSec ([int]'${{ inputs.quickstart_startup_timeout_seconds }}') `
            -StreamProcessingTimeoutSeconds ([int]'${{ inputs.stream_processing_timeout_seconds }}')

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: agentic-authoring-smoke-artifacts
          path: |
            artifacts/ai-sse-smoke/**
            praxis-config-starter/target/agentic-authoring/**
            artifacts/page-builder-agentic-full-e2e/**
            praxis-api-quickstart/logs/**
            praxis-ui-angular/test-results/**
            praxis-ui-angular/tools/e2e/playwright/playwright-agentic-report/**
          if-no-files-found: ignore
