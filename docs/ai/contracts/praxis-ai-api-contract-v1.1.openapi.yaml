openapi: 3.0.3
info:
  title: Praxis AI Patch & Stream Contract
  version: v1.1
  description: |
    Fonte unica de contrato para endpoints corporativos de patch e streaming SSE.
    Cobre /patch retrocompativel, /patch/stream/{start,connect,probe,cancel}
    e /authoring/turn/stream/{start,connect,probe,cancel}.
servers:
  - url: /

tags:
  - name: ai-patch
  - name: ai-stream
  - name: ai-authoring
  - name: domain-rules

paths:
  /api/praxis/config/ai/patch:
    post:
      tags: [ai-patch]
      operationId: generatePatch
      summary: Gera patch snapshot (retrocompativel)
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/EnvHeader'
        - $ref: '#/components/parameters/ContractVersionHeader'
        - $ref: '#/components/parameters/ContractSchemaHashHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiOrchestratorRequest'
      responses:
        '200':
          description: Patch/clarification/error gerado
          headers:
            X-Praxis-Contract-Version:
              $ref: '#/components/headers/ContractVersionHeader'
            X-Praxis-Schema-Hash:
              $ref: '#/components/headers/ContractSchemaHashHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiOrchestratorResponse'
        '409':
          description: Mismatch de contrato (versao/hash)
          headers:
            X-Praxis-Contract-Version:
              $ref: '#/components/headers/ContractVersionHeader'
            X-Praxis-Schema-Hash:
              $ref: '#/components/headers/ContractSchemaHashHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiOrchestratorResponse'
        '422':
          description: Erro de validacao semantica (ex. enum invalido)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiOrchestratorResponse'

  /api/praxis/config/ai/patch/stream/start:
    post:
      tags: [ai-stream]
      operationId: startPatchStream
      summary: Inicia stream SSE com idempotencia por clientTurnId
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/EnvHeader'
        - $ref: '#/components/parameters/ContractVersionHeader'
        - $ref: '#/components/parameters/ContractSchemaHashHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiOrchestratorRequest'
      responses:
        '201':
          description: Stream criado
          headers:
            X-Praxis-Contract-Version:
              $ref: '#/components/headers/ContractVersionHeader'
            X-Praxis-Schema-Hash:
              $ref: '#/components/headers/ContractSchemaHashHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiPatchStreamStartResponse'
        '200':
          description: Start idempotente reutilizando stream existente
          headers:
            X-Praxis-Contract-Version:
              $ref: '#/components/headers/ContractVersionHeader'
            X-Praxis-Schema-Hash:
              $ref: '#/components/headers/ContractSchemaHashHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiPatchStreamStartResponse'
        '400':
          description: Requisicao invalida (prompt/clientTurnId/contrato)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '403':
          description: Escopo de identidade nao autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '409':
          description: Contrato divergente ou idempotencia com payload divergente
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AiOrchestratorResponse'
                  - $ref: '#/components/schemas/ProblemResponse'
        '429':
          description: Limite por tenant/user excedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '503':
          description: Capacidade global/executor saturada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'

  /api/praxis/config/ai/patch/stream/{streamId}:
    get:
      tags: [ai-stream]
      operationId: connectPatchStream
      summary: Conecta no stream SSE (replay + incremental)
      parameters:
        - $ref: '#/components/parameters/StreamIdPath'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/EnvHeader'
        - $ref: '#/components/parameters/LastEventIdHeader'
        - $ref: '#/components/parameters/LastEventIdQuery'
        - $ref: '#/components/parameters/AccessTokenQuery'
      responses:
        '200':
          description: Stream SSE ativo
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                statusEvent:
                  summary: Evento status
                  value: |
                    id: 94c6fdb6-1aef-49a6-89fe-1437a0023be4
                    event: message
                    data: {"eventId":"94c6fdb6-1aef-49a6-89fe-1437a0023be4","streamId":"3f1c7d4c-32ab-4ae4-b7de-d1ae11f5db66","threadId":"34a1a6b9-09b4-4b85-81aa-66b7a95f9356","turnId":"6e9f398a-5bc0-4da5-840e-af5ad78b6bb8","seq":1,"eventSchemaVersion":"v1","timestamp":"2026-02-22T06:44:02.055047900Z","type":"status","payload":{"state":"started","message":"Stream iniciado."}}
                heartbeat:
                  summary: Heartbeat out-of-band (sem id)
                  value: |
                    event: message
                    data: {"eventId":null,"streamId":"3f1c7d4c-32ab-4ae4-b7de-d1ae11f5db66","threadId":"34a1a6b9-09b4-4b85-81aa-66b7a95f9356","turnId":"6e9f398a-5bc0-4da5-840e-af5ad78b6bb8","seq":-1,"eventSchemaVersion":"v1","timestamp":"2026-02-22T06:44:10.000000Z","type":"heartbeat","payload":{"state":"alive","message":"keep-alive"}}
        '400':
          description: Last-Event-ID invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '403':
          description: Stream ou Last-Event-ID fora do escopo autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '404':
          description: Stream inexistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '410':
          description: Stream expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'

  /api/praxis/config/ai/patch/stream/{streamId}/probe:
    get:
      tags: [ai-stream]
      operationId: probePatchStream
      summary: Probe de autorizacao/disponibilidade do stream
      parameters:
        - $ref: '#/components/parameters/StreamIdPath'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/EnvHeader'
        - $ref: '#/components/parameters/AccessTokenQuery'
      responses:
        '204':
          description: Stream acessivel
        '403':
          description: Escopo nao autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '404':
          description: Stream inexistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '410':
          description: Stream expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'

  /api/praxis/config/ai/patch/stream/{streamId}/cancel:
    post:
      tags: [ai-stream]
      operationId: cancelPatchStream
      summary: Cancela stream em andamento com terminal deterministico
      parameters:
        - $ref: '#/components/parameters/StreamIdPath'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/EnvHeader'
        - $ref: '#/components/parameters/AccessTokenQuery'
      responses:
        '200':
          description: Cancel aplicado (ou stream ja terminal)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiPatchStreamCancelResponse'
        '403':
          description: Escopo nao autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '404':
          description: Stream nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiPatchStreamCancelResponse'

  /api/praxis/config/ai/authoring/component-capabilities:
    get:
      tags: [ai-authoring]
      operationId: listAgenticAuthoringComponentCapabilities
      summary: Lista capacidades executaveis por componente para authoring agentico
      responses:
        '200':
          description: Catalogo de capacidades de componentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgenticAuthoringComponentCapabilitiesResult'

  /api/praxis/config/ai/authoring/resource-candidates:
    post:
      tags: [ai-authoring]
      operationId: searchAgenticAuthoringResourceCandidates
      summary: Busca recursos de API candidatos para alimentar uma tela ou componente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgenticAuthoringResourceCandidatesRequest'
      responses:
        '200':
          description: Recursos candidatos recuperados do catalogo de APIs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgenticAuthoringResourceCandidatesResult'

  /api/praxis/config/ai/authoring/manifests/{componentId}:
    get:
      tags: [ai-authoring]
      operationId: getAgenticAuthoringManifest
      summary: Le o authoringManifest executavel projetado no ai_registry
      parameters:
        - $ref: '#/components/parameters/ComponentIdPath'
      responses:
        '200':
          description: Manifest executavel do componente
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Manifest inexistente ou invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgenticAuthoringDryRunErrorResponse'

  /api/praxis/config/ai/authoring/manifests/{componentId}/editable-targets:
    get:
      tags: [ai-authoring]
      operationId: listAgenticAuthoringManifestTargets
      summary: Lista editableTargets declarados pelo manifest do componente
      parameters:
        - $ref: '#/components/parameters/ComponentIdPath'
      responses:
        '200':
          description: Alvos editaveis declarados pelo manifest
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        '400':
          description: Manifest inexistente ou invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgenticAuthoringDryRunErrorResponse'

  /api/praxis/config/ai/authoring/manifests/{componentId}/operations:
    get:
      tags: [ai-authoring]
      operationId: listAgenticAuthoringManifestOperations
      summary: Lista operacoes tipadas declaradas pelo manifest do componente
      parameters:
        - $ref: '#/components/parameters/ComponentIdPath'
      responses:
        '200':
          description: Operacoes tipadas declaradas pelo manifest
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        '400':
          description: Manifest inexistente ou invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgenticAuthoringDryRunErrorResponse'

  /api/praxis/config/ai/authoring/manifests/{componentId}/resolve-target:
    post:
      tags: [ai-authoring]
      operationId: resolveAgenticAuthoringManifestTarget
      summary: Resolve alvo usando target resolver declarado no manifest
      parameters:
        - $ref: '#/components/parameters/ComponentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgenticAuthoringResolveTargetRequest'
      responses:
        '200':
          description: Resultado de resolucao do alvo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgenticAuthoringResolvedTarget'
        '400':
          description: Manifest inexistente, invalido ou requisicao inconsistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgenticAuthoringDryRunErrorResponse'

  /api/praxis/config/ai/authoring/manifests/{componentId}/validate-plan:
    post:
      tags: [ai-authoring]
      operationId: validateAgenticAuthoringManifestPlan
      summary: Valida plano de edicao contra estrutura executavel do manifest
      parameters:
        - $ref: '#/components/parameters/ComponentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgenticAuthoringManifestEditPlanRequest'
      responses:
        '200':
          description: Resultado de validacao estrutural do plano
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgenticAuthoringManifestValidationResult'
        '400':
          description: Manifest inexistente, invalido ou requisicao inconsistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgenticAuthoringDryRunErrorResponse'

  /api/praxis/config/ai/authoring/manifests/{componentId}/compile-patch:
    post:
      tags: [ai-authoring]
      operationId: compileAgenticAuthoringManifestPatch
      summary: Compila efeitos genericos do manifest em patch aplicavel
      parameters:
        - $ref: '#/components/parameters/ComponentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgenticAuthoringManifestEditPlanRequest'
      responses:
        '200':
          description: Patch compilado com proposedConfig ou falhas de compilacao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgenticAuthoringManifestCompileResult'
        '400':
          description: Manifest inexistente, invalido ou requisicao inconsistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgenticAuthoringDryRunErrorResponse'

  /api/praxis/config/ai/authoring/turn/stream/start:
    post:
      tags: [ai-authoring]
      operationId: startAgenticAuthoringTurnStream
      summary: Inicia stream SSE de turno do authoring agentico
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/EnvHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgenticAuthoringTurnStreamRequest'
      responses:
        '201':
          description: Stream de turno criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgenticAuthoringTurnStreamStartResponse'
        '200':
          description: Start idempotente reutilizando stream existente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgenticAuthoringTurnStreamStartResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '403':
          description: Escopo de identidade nao autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '503':
          description: Stream de authoring nao configurado ou executor indisponivel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'

  /api/praxis/config/ai/authoring/turn/stream/{streamId}:
    get:
      tags: [ai-authoring]
      operationId: connectAgenticAuthoringTurnStream
      summary: Conecta no stream SSE do turno de authoring
      parameters:
        - $ref: '#/components/parameters/StreamIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/EnvHeader'
        - $ref: '#/components/parameters/LastEventIdHeader'
        - $ref: '#/components/parameters/LastEventIdQuery'
        - $ref: '#/components/parameters/AccessTokenQuery'
      responses:
        '200':
          description: Stream SSE ativo
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                thoughtStep:
                  summary: Evento de progresso de authoring
                  value: |
                    id: 94c6fdb6-1aef-49a6-89fe-1437a0023be4
                    event: thought.step
                    data: {"eventId":"94c6fdb6-1aef-49a6-89fe-1437a0023be4","streamId":"3f1c7d4c-32ab-4ae4-b7de-d1ae11f5db66","threadId":"34a1a6b9-09b4-4b85-81aa-66b7a95f9356","turnId":"6e9f398a-5bc0-4da5-840e-af5ad78b6bb8","seq":2,"eventSchemaVersion":"v1","timestamp":"2026-04-15T21:10:00Z","type":"thought.step","payload":{"phase":"intent.resolve","summary":"Resolving authoring intent."}}
        '400':
          description: Last-Event-ID invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '403':
          description: Stream ou Last-Event-ID fora do escopo autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '404':
          description: Stream inexistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '410':
          description: Stream expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'

  /api/praxis/config/ai/authoring/turn/stream/{streamId}/probe:
    get:
      tags: [ai-authoring]
      operationId: probeAgenticAuthoringTurnStream
      summary: Probe de autorizacao/disponibilidade do stream de authoring
      parameters:
        - $ref: '#/components/parameters/StreamIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/EnvHeader'
        - $ref: '#/components/parameters/AccessTokenQuery'
      responses:
        '204':
          description: Stream acessivel
        '403':
          description: Escopo nao autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '404':
          description: Stream inexistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '410':
          description: Stream expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'

  /api/praxis/config/ai/authoring/turn/stream/{streamId}/cancel:
    post:
      tags: [ai-authoring]
      operationId: cancelAgenticAuthoringTurnStream
      summary: Cancela stream de authoring em andamento
      parameters:
        - $ref: '#/components/parameters/StreamIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/EnvHeader'
        - $ref: '#/components/parameters/AccessTokenQuery'
      responses:
        '200':
          description: Cancel aplicado ou stream ja terminal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiPatchStreamCancelResponse'
        '403':
          description: Escopo nao autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '404':
          description: Stream nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiPatchStreamCancelResponse'

  /api/praxis/config/ai/authoring/intent-resolution:
    post:
      tags: [ai-authoring]
      operationId: resolveAgenticAuthoringIntent
      summary: Resolve intencao de authoring com contexto conversacional opcional
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgenticAuthoringIntentResolutionRequest'
      responses:
        '200':
          description: Intencao resolvida ou clarificacao requerida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgenticAuthoringIntentResolutionResult'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'

  /api/praxis/config/ai/authoring/page-preview:
    post:
      tags: [ai-authoring]
      operationId: previewAgenticAuthoringPage
      summary: Gera preview de pagina usando plano LLM ou UiCompositionPlan deterministico
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/EnvHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgenticAuthoringPlanRequest'
      responses:
        '200':
          description: Preview validado para revisao no frontend
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgenticAuthoringPreviewResult'
        '400':
          description: Requisicao invalida ou configuracao incompleta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'

  /api/praxis/config/ai/authoring/page-apply:
    post:
      tags: [ai-authoring]
      operationId: applyAgenticAuthoringPage
      summary: Persiste pagina revisada pelo fluxo de authoring agentico
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/EnvHeader'
        - name: X-Updated-By
          in: header
          required: false
          schema:
            type: string
        - name: If-Match
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgenticAuthoringApplyRequest'
      responses:
        '200':
          description: Configuracao persistida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgenticAuthoringApplyResult'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '412':
          description: ETag divergente
          content:
            text/plain:
              schema:
                type: string

  /api/praxis/config/domain-rules/intake:
    post:
      tags: [domain-rules]
      operationId: intakeDomainRule
      summary: Persiste um draft governado de decisao semantica a partir do prompt
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/EnvHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainRuleIntakeRequest'
      responses:
        '202':
          description: Intake aceito com grounding e definicao persistida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainRuleIntakeResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'

  /api/praxis/config/domain-knowledge/change-sets/{changeSetId}/timeline:
    get:
      tags: [domain-knowledge]
      operationId: getDomainKnowledgeChangeSetTimeline
      summary: Retorna timeline segura de um change set de Domain Knowledge
      description: Projecao read-only derivada do change set, validacao, revisao e aplicacao; nao retorna patch bruto, payload de evidencia, sourcePointer, sourceUri, patchHash, prompt ou historico de chat.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/EnvHeader'
        - name: changeSetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Timeline encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainKnowledgeChangeSetTimelineResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '404':
          description: Change set nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'

