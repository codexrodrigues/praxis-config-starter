# Spring Boot application properties

# Database configuration for Neon PostgreSQL
spring.datasource.url=jdbc:postgresql://ep-round-frost-a45qok7t-pooler.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_1PHN4furkmZd
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=none
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql=true

# Flyway migrations
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Embedding provider (gemini|mock) and dimensions
embedding.provider=${EMBEDDING_PROVIDER:gemini}
embedding.dimensions=768
embedding.gemini.api-key=${PRAXIS_AI_GEMINI_API_KEY:${GEMINI_API_KEY:}}
embedding.openai.api-key=${PRAXIS_AI_OPENAI_API_KEY:${OPENAI_API_KEY:}}
embedding.openai.model=${EMBEDDING_OPENAI_MODEL:text-embedding-3-large}

# AI defaults (timeouts/retries)
praxis.ai.timeout-seconds=30
praxis.ai.retry.max-attempts=2
praxis.ai.retry.initial-delay-ms=500
praxis.ai.retry.max-delay-ms=2000
# AI API key encryption (base64 AES key, 16/24/32 bytes)
praxis.ai.api-key.encryption-key=${PRAXIS_AI_API_KEY_ENCRYPTION_KEY:}
# AI API key maintenance access control
praxis.ai.keys.admin-token=${PRAXIS_AI_KEYS_ADMIN_TOKEN:}
praxis.ai.keys.require-admin-token=true

# AI prompt budgets (chars per block)
praxis.ai.prompt.max-chars.config=12000
praxis.ai.prompt.max-chars.schema=12000
praxis.ai.prompt.max-chars.template-config=8000
praxis.ai.prompt.max-chars.template-meta=4000
praxis.ai.prompt.max-chars.capabilities=12000
praxis.ai.prompt.max-chars.capability-notes=3000

# AI interaction logging
praxis.ai.logging.enabled=true
praxis.ai.logging.include-prompt=true
praxis.ai.logging.include-response=true
praxis.ai.logging.include-front-response=true
praxis.ai.logging.pretty-json=true
praxis.ai.logging.max-chars=20000
