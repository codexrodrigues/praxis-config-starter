# Spring Boot application properties

# Database configuration
spring.datasource.url=${PRAXIS_DB_URL:}
spring.datasource.username=${PRAXIS_DB_USERNAME:}
spring.datasource.password=${PRAXIS_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=none
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql=true

# Flyway migrations
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Spring AI providers (OpenAI + xAI compat, Gemini via AI Studio/Google GenAI)
praxis.ai.provider-fallback.enabled=${PRAXIS_AI_PROVIDER_FALLBACK_ENABLED:true}
praxis.ai.provider-fallback.candidates=${PRAXIS_AI_PROVIDER_FALLBACK_CANDIDATES:gemini,openai}
spring.ai.embedding.provider=${PRAXIS_AI_EMBEDDING_PROVIDER:gemini}
spring.ai.openai.api-key=${PRAXIS_AI_OPENAI_API_KEY:${OPENAI_API_KEY:}}
spring.ai.openai.base-url=${PRAXIS_AI_OPENAI_BASE_URL:https://api.openai.com}
spring.ai.openai.chat.options.model=${PRAXIS_AI_OPENAI_MODEL:gpt-4o-mini}
spring.ai.openai.embedding.options.model=${PRAXIS_AI_OPENAI_EMBEDDING_MODEL:text-embedding-3-large}
spring.ai.openai.embedding.options.dimensions=${PRAXIS_AI_EMBEDDING_DIMENSIONS:768}
praxis.ai.openai.json-min-completion-tokens=${PRAXIS_AI_OPENAI_JSON_MIN_COMPLETION_TOKENS:8192}
spring.autoconfigure.exclude=${SPRING_AUTOCONFIGURE_EXCLUDE:org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration,org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration,org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration,org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiTextEmbeddingAutoConfiguration}

spring.ai.google.genai.api-key=${PRAXIS_AI_GEMINI_API_KEY:${GEMINI_API_KEY:}}
spring.ai.google.genai.embedding.api-key=${PRAXIS_AI_GEMINI_API_KEY:${GEMINI_API_KEY:}}
spring.ai.google.genai.project-id=${PRAXIS_AI_GEMINI_PROJECT_ID:}
spring.ai.google.genai.location=${PRAXIS_AI_GEMINI_LOCATION:}
spring.ai.google.genai.chat.options.model=${PRAXIS_AI_GEMINI_MODEL:gemini-2.5-flash}
praxis.ai.gemini.preview-enabled=${PRAXIS_AI_GEMINI_PREVIEW_ENABLED:false}
praxis.ai.gemini.prefer-genai-api=${PRAXIS_AI_GEMINI_PREFER_GENAI_API:true}
praxis.ai.gemini.fallback-models=${PRAXIS_AI_GEMINI_FALLBACK_MODELS:gemini-2.5-flash,gemini-2.0-flash}
praxis.ai.gemini.json-min-output-tokens=${PRAXIS_AI_GEMINI_JSON_MIN_OUTPUT_TOKENS:8192}
praxis.ai.gemini.retry.max-attempts=${PRAXIS_AI_GEMINI_RETRY_MAX_ATTEMPTS:3}
praxis.ai.gemini.retry.base-delay-ms=${PRAXIS_AI_GEMINI_RETRY_BASE_DELAY_MS:300}
praxis.ai.gemini.retry.jitter-percent=${PRAXIS_AI_GEMINI_RETRY_JITTER_PERCENT:30}
praxis.ai.gemini.breaker.threshold=${PRAXIS_AI_GEMINI_BREAKER_THRESHOLD:3}
praxis.ai.gemini.breaker.window-ms=${PRAXIS_AI_GEMINI_BREAKER_WINDOW_MS:30000}
praxis.ai.gemini.breaker.open-ms=${PRAXIS_AI_GEMINI_BREAKER_OPEN_MS:30000}
spring.ai.google.genai.embedding.text.options.model=${PRAXIS_AI_GEMINI_EMBEDDING_MODEL:text-embedding-004}
spring.ai.google.genai.embedding.text.options.dimensions=${PRAXIS_AI_EMBEDDING_DIMENSIONS:768}
praxis.ai.authoring.http-enabled=${PRAXIS_AI_AUTHORING_HTTP_ENABLED:true}

# AI defaults (timeouts/retries)
praxis.ai.timeout-seconds=75
praxis.ai.retry.max-attempts=2
praxis.ai.retry.initial-delay-ms=500
praxis.ai.retry.max-delay-ms=2000
# AI API key encryption (base64 AES key, 16/24/32 bytes)
praxis.ai.api-key.encryption-key=${PRAXIS_AI_API_KEY_ENCRYPTION_KEY:}
# AI API key maintenance access control
praxis.ai.keys.admin-token=${PRAXIS_AI_KEYS_ADMIN_TOKEN:}
praxis.ai.keys.require-admin-token=true

# AI prompt budgets (chars per block)
praxis.ai.prompt.max-chars.config=12000
praxis.ai.prompt.max-chars.schema=12000
praxis.ai.prompt.max-chars.template-config=8000
praxis.ai.prompt.max-chars.template-meta=4000
praxis.ai.prompt.max-chars.capabilities=12000
praxis.ai.prompt.max-chars.capability-notes=3000

# RAG VectorStore defaults
praxis.ai.rag.vector-store.enabled=true
praxis.ai.rag.vector-store.table=vector_store
praxis.ai.rag.vector-store.schema=public
praxis.ai.rag.vector-store.dimensions=0
praxis.ai.rag.chat.enabled=false
praxis.ai.rag.chat.mode=naive
praxis.ai.rag.chat.top-k=5
praxis.ai.rag.chat.similarity-threshold=0.0
praxis.project-knowledge.rag-publication.enabled=false
praxis.project-knowledge.rag-retrieval.enabled=false

# AI interaction logging
praxis.ai.logging.enabled=true
praxis.ai.logging.include-prompt=false
praxis.ai.logging.include-response=false
praxis.ai.logging.include-front-response=false
praxis.ai.logging.pretty-json=true
praxis.ai.logging.max-chars=20000

# AI identity + stream defaults
praxis.ai.security.corporate-mode=true
praxis.ai.security.allow-header-identity-in-local=false
praxis.ai.security.allow-default-tenant-in-corporate=false
praxis.ai.security.local-default-tenant=demo
praxis.ai.security.local-default-user=demo
praxis.ai.security.local-default-environment=local
praxis.ai.security.server-default-tenant=
praxis.ai.security.server-default-environment=prod
praxis.ai.stream.event-schema-version=v1
praxis.ai.stream.expires-seconds=900
praxis.ai.stream.emitter-timeout-ms=300000
praxis.ai.stream.heartbeat-seconds=15
praxis.ai.authoring.stream.heartbeat-seconds=5
praxis.ai.stream.processing-poll-seconds=1
praxis.ai.stream.processing-timeout-seconds=${PRAXIS_AI_STREAM_PROCESSING_TIMEOUT_SECONDS:360}
praxis.ai.stream.processing-max-polls=30
praxis.ai.stream.max-active-global=200
praxis.ai.stream.max-active-per-tenant=50
praxis.ai.stream.max-active-per-user=10
praxis.ai.stream.auth.mode=cookie
praxis.ai.stream.auth.token-secret=
praxis.ai.stream.auth.token-ttl-seconds=900
praxis.ai.stream.auth.allow-legacy-signed-token=false
# Provider text streaming is opt-in to preserve stable sync behavior by default.
praxis.ai.provider.text-stream.enabled=false
praxis.ai.provider.text-stream.fallback-sync-on-error=true
