components:
  parameters:
    StreamIdPath:
      name: streamId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ComponentIdPath:
      name: componentId
      in: path
      required: true
      schema:
        type: string
    RequestIdHeader:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
    TenantIdHeader:
      name: X-Tenant-ID
      in: header
      required: false
      schema:
        type: string
    UserIdHeader:
      name: X-User-ID
      in: header
      required: false
      schema:
        type: string
    EnvHeader:
      name: X-Env
      in: header
      required: false
      schema:
        type: string
    ContractVersionHeader:
      name: X-Praxis-Contract-Version
      in: header
      required: false
      schema:
        type: string
        default: v1.1
    ContractSchemaHashHeader:
      name: X-Praxis-Schema-Hash
      in: header
      required: false
      schema:
        type: string
        default: 68011e5f49ded11a590170e8440b6b1745c013be44dd101651542e87af6ebcba
    LastEventIdHeader:
      name: Last-Event-ID
      in: header
      required: false
      schema:
        type: string
    LastEventIdQuery:
      name: lastEventId
      in: query
      required: false
      schema:
        type: string
    AccessTokenQuery:
      name: accessToken
      in: query
      required: false
      schema:
        type: string

  headers:
    ContractVersionHeader:
      description: Versao de contrato efetiva no backend
      schema:
        type: string
        example: v1.1
    ContractSchemaHashHeader:
      description: Hash do schema de contrato efetivo no backend
      schema:
        type: string
        example: 68011e5f49ded11a590170e8440b6b1745c013be44dd101651542e87af6ebcba

  schemas:
    AgenticAuthoringDryRunErrorResponse:
      type: object
      properties:
        valid:
          type: boolean
        failureCodes:
          type: array
          items:
            type: string
        message:
          type: string
      additionalProperties: false

    AgenticAuthoringManifestEditPlanRequest:
      type: object
      properties:
        config:
          type: object
          nullable: true
          additionalProperties: true
        plan:
          type: object
          nullable: true
          additionalProperties: true
      additionalProperties: false

    AgenticAuthoringResolveTargetRequest:
      type: object
      properties:
        config:
          type: object
          nullable: true
          additionalProperties: true
        operationId:
          type: string
        target:
          nullable: true
        input:
          nullable: true
      additionalProperties: false

    AgenticAuthoringResolvedTarget:
      type: object
      properties:
        status:
          type: string
        componentId:
          type: string
        operationId:
          type: string
        kind:
          type: string
        resolver:
          type: string
        path:
          type: string
        value:
          nullable: true
        candidates:
          type: array
          items:
            type: string
        failures:
          type: array
          items:
            type: string
      additionalProperties: false

    AgenticAuthoringManifestValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        failures:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        normalizedPlan:
          type: object
          additionalProperties: true
      additionalProperties: false

    AgenticAuthoringManifestCompileResult:
      type: object
      properties:
        compiled:
          type: boolean
        failures:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        patch:
          $ref: '#/components/schemas/AgenticAuthoringCompiledComponentPatch'
      additionalProperties: false

    AgenticAuthoringCompiledComponentPatch:
      type: object
      description: Patch compilado para configuracao de componente. `compiledOperations` e a representacao canonica preferencial para backend tools; `operations` e `patchOperations` permanecem como aliases legados dos efeitos compilados nativos.
      properties:
        componentId:
          type: string
        manifestVersion:
          type: string
          nullable: true
        patchKind:
          type: string
          enum: [component-config-patch]
        compiledOperations:
          type: array
          description: Operacoes canonicas normalizadas, independentes dos nomes internos de handlers.
          items:
            $ref: '#/components/schemas/AgenticAuthoringCompiledPatchOperation'
        operations:
          type: array
          description: Alias legado contendo efeitos compilados nativos do compilador, inclusive handlers de dominio.
          items:
            type: object
            additionalProperties: true
        patchOperations:
          type: array
          description: Patch aplicavel concreto. Para efeitos genericos, materializa operacoes com paths resolvidos e aplicaveis; para `compile-domain-patch`, preserva a operacao especializada emitida pelo handler.
          items:
            type: object
            additionalProperties: true
        proposedConfig:
          type: object
          additionalProperties: true
      additionalProperties: true

    AgenticAuthoringCompiledPatchOperation:
      type: object
      description: Operacao compilada canonica para aplicacao ou auditoria de patch.
      properties:
        op:
          type: string
          enum:
            - merge-object-by-key
            - merge-object
            - set-value
            - remove-by-key
            - append
            - append-unique
            - reorder-by-key
            - domain-patch
        componentId:
          type: string
        operationId:
          type: string
        path:
          type: string
        resolvedPath:
          type: string
          nullable: true
        key:
          type: string
          nullable: true
        keyValue:
          nullable: true
        value:
          nullable: true
        removedValue:
          nullable: true
        removedIndex:
          type: integer
          nullable: true
        fromIndex:
          type: integer
          nullable: true
        toIndex:
          type: integer
          nullable: true
        appendedIndex:
          type: integer
          nullable: true
        handler:
          type: string
          nullable: true
        submissionImpact:
          type: string
          nullable: true
        compilerBoundary:
          type: boolean
          nullable: true
      additionalProperties: true

    AgenticAuthoringConversationMessage:
      type: object
      properties:
        id:
          type: string
          nullable: true
        role:
          type: string
          enum: [user, assistant, system]
        text:
          type: string
          nullable: true
        createdAt:
          type: string
          nullable: true
      additionalProperties: false

    AgenticAuthoringPendingClarification:
      type: object
      properties:
        sourcePrompt:
          type: string
          nullable: true
        questions:
          type: array
          items:
            type: string
        assistantMessage:
          type: string
          nullable: true
        clientTurnId:
          type: string
          nullable: true
        diagnostics:
          type: object
          nullable: true
          description: Diagnosticos opacos do estado pendente. Quando houver anexos no turno que originou a clarificacao, pode transportar attachmentSummaries para continuidade conversacional sem reenviar bytes, File, base64 ou URLs blob.
          additionalProperties: true
      additionalProperties: false

    AgenticAuthoringAttachmentSummary:
      type: object
      description: Resumo seguro de anexos do turno conversacional. Nao transporta bytes, File, base64 nem URLs locais blob.
      properties:
        id:
          type: string
        name:
          type: string
        kind:
          type: string
        mimeType:
          type: string
          nullable: true
        sizeBytes:
          type: integer
          format: int64
          nullable: true
        source:
          type: string
          nullable: true
          description: Origem declarada pelo cliente, por exemplo paste, file-picker ou host.
        hasPreview:
          type: boolean
          description: Indica se o cliente possui preview local, sem expor a URL local ao backend.
      additionalProperties: false

    AgenticAuthoringConversationContext:
      type: object
      properties:
        sessionId:
          type: string
          nullable: true
        clientTurnId:
          type: string
          nullable: true
        conversationMessages:
          type: array
          items:
            $ref: '#/components/schemas/AgenticAuthoringConversationMessage'
        pendingClarification:
          $ref: '#/components/schemas/AgenticAuthoringPendingClarification'
        attachmentSummaries:
          type: array
          items:
            $ref: '#/components/schemas/AgenticAuthoringAttachmentSummary'

    AgenticAuthoringIntentResolutionRequest:
      allOf:
        - $ref: '#/components/schemas/AgenticAuthoringConversationContext'
        - type: object
          required:
            - userPrompt
          properties:
            userPrompt:
              type: string
            targetApp:
              type: string
              nullable: true
            targetComponentId:
              type: string
              nullable: true
            currentRoute:
              type: string
              nullable: true
            currentPage:
              type: object
              nullable: true
              additionalProperties: true
            selectedWidgetKey:
              type: string
              nullable: true
            provider:
              type: string
              nullable: true
            model:
              type: string
              nullable: true
            apiKey:
              type: string
              nullable: true
            contextHints:
              type: object
              nullable: true
              properties:
                domainCatalog:
                  $ref: '#/components/schemas/AiDomainCatalogContextHint'
              additionalProperties: true
              description: Dados estruturados preservados de acoes do assistente, como chips de recurso.

    AgenticAuthoringPlanRequest:
      allOf:
        - $ref: '#/components/schemas/AgenticAuthoringConversationContext'
        - type: object
          required:
            - userPrompt
          properties:
            userPrompt:
              type: string
            provider:
              type: string
              nullable: true
            model:
              type: string
              nullable: true
            apiKey:
              type: string
              nullable: true
            currentPage:
              type: object
              nullable: true
              additionalProperties: true
            intentResolution:
              $ref: '#/components/schemas/AgenticAuthoringIntentResolutionResult'
            contextHints:
              type: object
              nullable: true
              additionalProperties: true
              properties:
                domainCatalog:
                  $ref: '#/components/schemas/AiDomainCatalogContextHint'
              description: Dados estruturados preservados de acoes do assistente, como chips de recurso.

    AgenticAuthoringTurnStreamRequest:
      allOf:
        - $ref: '#/components/schemas/AgenticAuthoringConversationContext'
        - type: object
          required:
            - userPrompt
            - clientTurnId
          properties:
            userPrompt:
              type: string
            targetApp:
              type: string
              nullable: true
            targetComponentId:
              type: string
              nullable: true
            currentRoute:
              type: string
              nullable: true
            currentPage:
              type: object
              nullable: true
              additionalProperties: true
            selectedWidgetKey:
              type: string
              nullable: true
            provider:
              type: string
              nullable: true
            model:
              type: string
              nullable: true
            apiKey:
              type: string
              nullable: true
            contextHints:
              type: object
              nullable: true
              additionalProperties: true
            componentCapabilities:
              $ref: '#/components/schemas/AgenticAuthoringComponentCapabilitiesResult'

    AgenticAuthoringApplyRequest:
      type: object
      required:
        - componentType
        - componentId
        - payload
      properties:
        componentType:
          type: string
        componentId:
          type: string
        scope:
          type: string
          nullable: true
        payload:
          type: object
          additionalProperties: true
        tags:
          type: object
          nullable: true
          additionalProperties: true
      additionalProperties: true

    AgenticAuthoringComponentCapabilitiesResult:
      type: object
      properties:
        version:
          type: string
        catalogs:
          type: array
          items:
            $ref: '#/components/schemas/AgenticAuthoringComponentCapabilityCatalog'
      additionalProperties: true

    AgenticAuthoringComponentCapabilityCatalog:
      type: object
      properties:
        componentId:
          type: string
        version:
          type: string
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/AgenticAuthoringComponentCapability'
      additionalProperties: true

    AgenticAuthoringComponentCapability:
      type: object
      properties:
        id:
          type: string
        changeKind:
          type: string
        triggerTerms:
          type: array
          items:
            type: string
        fieldAliases:
          type: array
          items:
            $ref: '#/components/schemas/AgenticAuthoringComponentFieldAlias'
        examples:
          type: array
          items:
            $ref: '#/components/schemas/AgenticAuthoringComponentCapabilityExample'
      additionalProperties: true

    AgenticAuthoringComponentFieldAlias:
      type: object
      properties:
        field:
          type: string
        aliases:
          type: array
          items:
            type: string
      additionalProperties: true

    AgenticAuthoringComponentCapabilityExample:
      type: object
      properties:
        prompt:
          type: string
        intent:
          type: string
        configHints:
          type: array
          items:
            type: string
      additionalProperties: true

    AgenticAuthoringResourceCandidatesRequest:
      type: object
      properties:
        retrievalQuery:
          type: string
          nullable: true
          description: Consulta semantica enviada pela LLM ou pelo chip de ferramenta.
        userPrompt:
          type: string
          nullable: true
          description: Prompt bruto usado como fallback quando retrievalQuery nao for informado.
        artifactKind:
          type: string
          nullable: true
          description: Tipo de artefato alvo, como dashboard, table, form ou unknown.
        limit:
          type: integer
          nullable: true
          minimum: 1
          maximum: 20

    AgenticAuthoringCandidate:
      type: object
      properties:
        resourcePath:
          type: string
        operation:
          type: string
        schemaUrl:
          type: string
        submitUrl:
          type: string
        submitMethod:
          type: string
        score:
          type: number
          format: double
        reason:
          type: string
        evidence:
          type: array
          items:
            type: string
      additionalProperties: true

    AgenticAuthoringResourceCandidatesResult:
      type: object
      properties:
        valid:
          type: boolean
        tool:
          type: string
          enum: [searchApiResources]
        retrievalQuery:
          type: string
        artifactKind:
          type: string
        assistantMessage:
          type: string
          nullable: true
          description: Mensagem consultiva que o cliente deve renderizar junto com os candidatos retornados.
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/AgenticAuthoringCandidate'
        quickReplies:
          type: array
          description: Chips canonicos para escolha de recurso retornados pelo backend.
          items:
            $ref: '#/components/schemas/AgenticAuthoringQuickReply'
        warnings:
          type: array
          items:
            type: string
      additionalProperties: true

    AgenticAuthoringIntentResolutionResult:
      type: object
      properties:
        valid:
          type: boolean
        operationKind:
          type: string
          description: Tipo canonico da operacao conversacional. Para perguntas sobre catalogo de APIs, usar explore sem iniciar preview/aplicacao de pagina.
        artifactKind:
          type: string
          description: Artefato alvo da operacao. api_catalog representa perguntas sobre endpoints, schemas, actions, filtros, APIs relacionadas ou escolha de API antes da geracao de pagina.
        changeKind:
          type: string
          description: Tipo canonico da mudanca ou resposta. answer_api_catalog_question representa resposta consultiva sobre catalogo de APIs.
        selectedCandidate:
          type: object
          nullable: true
          additionalProperties: true
        candidates:
          type: array
          items:
            type: object
            additionalProperties: true
        gate:
          type: object
          nullable: true
          additionalProperties: true
        effectivePrompt:
          type: string
          nullable: true
          description: Prompt efetivo usado pelo backend depois de resolver resposta curta, clarificacao pendente e contexto conversacional.
        assistantMessage:
          type: string
          nullable: true
          description: Mensagem consultiva ou explicativa que o cliente deve renderizar diretamente quando presente, incluindo respostas de API Catalog Q&A sobre endpoints, schemas, actions, filtros, APIs relacionadas e escolha de API.
        apiCatalogAnswer:
          $ref: '#/components/schemas/AgenticAuthoringApiCatalogAnswer'
          nullable: true
        quickReplies:
          type: array
          description: Chips canonicos sugeridos pelo backend para o proximo turno.
          items:
            $ref: '#/components/schemas/AgenticAuthoringQuickReply'
        pendingClarification:
          $ref: '#/components/schemas/AgenticAuthoringPendingClarification'
          nullable: true
          description: Estado canonico que o cliente deve reenviar no proximo turno quando a resposta exigir clarificacao.
        clarificationQuestions:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        failureCodes:
          type: array
          items:
            type: string
        llmDiagnostics:
